<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lumicsoft | Advanced Batch Payout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --gold: #eab308; }
        body { background: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        .text-gradient { background: linear-gradient(to right, #facc15, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-btn { background: linear-gradient(to right, #facc15, #ca8a04); color: black; transition: all 0.3s ease; border-radius: 12px; }
        .gold-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(234, 179, 8, 0.2); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ca8a04; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-6xl mx-auto px-6 py-10 relative z-10">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="orbitron text-2xl font-black uppercase tracking-tighter">Rebirth<span class="text-gradient">Key</span> PRO</h1>
                <p class="text-gray-500 text-[10px] tracking-widest uppercase">System v3.0 (History & Analytics)</p>
            </div>
            <button id="connect-wallet" onclick="connect()" class="glass px-6 py-2 text-xs font-bold border-yellow-500/20 text-yellow-500 hover:bg-yellow-500 hover:text-black transition-all">
                Connect Wallet
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-5 border-l-4 border-yellow-500">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Contract Bal</p>
                <h2 id="contract-bal" class="orbitron text-xl font-bold">0.00</h2>
            </div>
            <div class="glass p-5 border-l-4 border-blue-500">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Total Paid Out</p>
                <h2 id="total-paid" class="orbitron text-xl font-bold text-blue-400">0.00</h2>
            </div>
            <div class="glass p-5 border-l-4 border-green-500">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Total Users Paid</p>
                <h2 id="total-users" class="orbitron text-xl font-bold text-green-400">0</h2>
            </div>
            <div class="glass p-5 border-l-4 border-purple-500">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Batches Done</p>
                <h2 id="total-batches" class="orbitron text-xl font-bold text-purple-400">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6 sticky top-10">
                    <h3 class="orbitron text-sm font-bold mb-4 flex items-center gap-2"><i data-lucide="send" class="w-4 h-4 text-yellow-500"></i> New Payout</h3>
                    
                    <div id="upload-zone" class="border-2 border-dashed border-white/10 rounded-2xl p-8 text-center hover:border-yellow-500/40 transition-all cursor-pointer">
                        <input type="file" id="csv-input" accept=".csv" class="hidden">
                        <label for="csv-input" class="cursor-pointer">
                            <i data-lucide="file-up" class="w-8 h-8 mx-auto mb-2 text-gray-500"></i>
                            <p class="text-xs font-bold uppercase">Upload CSV</p>
                        </label>
                    </div>

                    <div id="progress-container" class="hidden mt-6">
                        <div class="flex justify-between text-[9px] mb-1 font-bold text-yellow-500">
                            <span id="progress-text uppercase">Wait...</span>
                            <span id="progress-percent">0%</span>
                        </div>
                        <div class="w-full h-1 bg-white/5 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-yellow-500 w-0"></div>
                        </div>
                    </div>

                    <button id="process-btn" onclick="startExecution()" class="gold-btn w-full mt-6 py-4 font-black text-xs uppercase hidden">Execute Batch</button>
                    <button onclick="emergencyWithdraw()" class="w-full mt-3 text-[9px] text-red-500 font-bold border border-red-500/20 py-2 rounded-lg hover:bg-red-500/10">Emergency Withdraw</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-6 min-h-[500px]">
                    <div class="flex flex-wrap justify-between items-center gap-4 mb-6">
                        <h3 class="orbitron text-sm font-bold uppercase flex items-center gap-2">
                            <i data-lucide="history" class="w-4 h-4 text-yellow-500"></i> History
                        </h3>
                        <div class="flex gap-2">
                            <input type="date" id="filter-date" onchange="renderHistory()" class="bg-black/40 border border-white/10 rounded-lg px-3 py-1 text-[10px]">
                            <button onclick="downloadHistory()" class="bg-yellow-500/10 text-yellow-500 border border-yellow-500/20 px-3 py-1 rounded-lg text-[10px] font-bold hover:bg-yellow-500 hover:text-black">Download CSV</button>
                            <button onclick="clearHistory()" class="bg-red-500/10 text-red-500 border border-red-500/20 px-3 py-1 rounded-lg text-[10px] font-bold">Clear</button>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px]">
                            <thead>
                                <tr class="text-gray-500 uppercase border-b border-white/5">
                                    <th class="pb-3 px-2">Date/Time</th>
                                    <th class="pb-3 px-2">TX Hash</th>
                                    <th class="pb-3 px-2 text-right">Users</th>
                                    <th class="pb-3 px-2 text-right">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0xed10a31e5f6a8830b252e80655435ce0055d2dac"; 
        const USDT_ADDRESS = "0x3B66b1E08F55AF26c8eA14a73dA64b6bC8D799dE"; // Standard BSC USDT
        const ABI = [
            "function multiWithdraw(address[] calldata _recipients, uint256[] calldata _amounts) external",
            "function emergencyWithdraw() external"
        ];
        const USDT_ABI = ["function balanceOf(address) view returns (uint256)"];

        let batchQueue = [];
        let isProcessing = false;
        let contract, signer;

        // Load History from LocalStorage
        let payoutHistory = JSON.parse(localStorage.getItem('rebirth_payout_history') || '[]');

        async function connect() {
            if (window.ethereum) {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                document.getElementById('connect-wallet').innerText = "Wallet Connected";
                refreshBalance();
                renderHistory();
            }
        }

        async function refreshBalance() {
            if (!signer) return;
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const usdtContract = new ethers.Contract(USDT_ADDRESS, USDT_ABI, provider);
            const bal = await usdtContract.balanceOf(CONTRACT_ADDRESS);
            document.getElementById('contract-bal').innerText = ethers.utils.formatUnits(bal, 18);
            updateStats();
        }

        document.getElementById('csv-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const rows = text.split('\n').filter(row => row.trim().includes(','));
                let recipients = [], amounts = [];
                
                rows.forEach(row => {
                    const [addr, amt] = row.split(',');
                    if(ethers.utils.isAddress(addr.trim())) {
                        recipients.push(addr.trim());
                        amounts.push(ethers.utils.parseUnits(amt.trim(), 18));
                    }
                });

                batchQueue = [];
                const chunkSize = 200;
                for (let i = 0; i < recipients.length; i += chunkSize) {
                    batchQueue.push({ r: recipients.slice(i, i + chunkSize), a: amounts.slice(i, i + chunkSize) });
                }
                document.getElementById('process-btn').classList.remove('hidden');
                document.getElementById('process-btn').innerText = `Start ${batchQueue.length} Batches`;
            };
            reader.readAsText(file);
        });

        async function startExecution() {
            if (isProcessing) return;
            isProcessing = true;
            document.getElementById('progress-container').classList.remove('hidden');

            for (let i = 0; i < batchQueue.length; i++) {
                try {
                    const progress = Math.round(((i+1)/batchQueue.length)*100);
                    document.getElementById('progress-bar').style.width = progress + '%';
                    document.getElementById('progress-percent').innerText = progress + '%';
                    document.getElementById('progress-text').innerText = `BATCH ${i+1}/${batchQueue.length}`;

                    const tx = await contract.multiWithdraw(batchQueue[i].r, batchQueue[i].a);
                    const receipt = await tx.wait();

                    // Calculate total amount in this batch
                    let batchSum = batchQueue[i].a.reduce((p, c) => p.add(c), ethers.BigNumber.from(0));

                    // Save to history
                    const entry = {
                        date: new Date().toISOString(),
                        hash: tx.hash,
                        users: batchQueue[i].r.length,
                        amount: ethers.utils.formatUnits(batchSum, 18)
                    };
                    payoutHistory.unshift(entry);
                    localStorage.setItem('rebirth_payout_history', JSON.stringify(payoutHistory));
                    renderHistory();

                } catch (err) {
                    alert("Error processing batch " + (i+1));
                    console.error(err);
                    break;
                }
            }
            isProcessing = false;
            document.getElementById('process-btn').innerText = "All Batches Done";
            refreshBalance();
        }

        function renderHistory() {
            const filterDate = document.getElementById('filter-date').value;
            const tbody = document.getElementById('history-table-body');
            tbody.innerHTML = '';

            let filtered = payoutHistory;
            if (filterDate) {
                filtered = payoutHistory.filter(item => item.date.startsWith(filterDate));
            }

            filtered.forEach(item => {
                const dateObj = new Date(item.date);
                tbody.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-all">
                        <td class="py-3 px-2 text-gray-400">${dateObj.toLocaleDateString()} <br> <span class="text-[9px]">${dateObj.toLocaleTimeString()}</span></td>
                        <td class="py-3 px-2 font-mono text-yellow-500/80"><a href="https://bscscan.com/tx/${item.hash}" target="_blank">${item.hash.substring(0, 10)}...</a></td>
                        <td class="py-3 px-2 text-right font-bold">${item.users}</td>
                        <td class="py-3 px-2 text-right text-green-400 font-bold">${item.amount} USDT</td>
                    </tr>
                `;
            });
            updateStats();
        }

        function updateStats() {
            let totalAmt = 0;
            let totalUsers = 0;
            payoutHistory.forEach(item => {
                totalAmt += parseFloat(item.amount);
                totalUsers += item.users;
            });
            document.getElementById('total-paid').innerText = totalAmt.toFixed(2);
            document.getElementById('total-users').innerText = totalUsers;
            document.getElementById('total-batches').innerText = payoutHistory.length;
        }

        function downloadHistory() {
            let csv = "Date,TxHash,Users,Amount\n";
            payoutHistory.forEach(item => {
                csv += `${item.date},${item.hash},${item.users},${item.amount}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('hidden', '');
            a.setAttribute('href', url);
            a.setAttribute('download', 'payout_history.csv');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function clearHistory() {
            if(confirm("Saara history data delete kar dein?")) {
                payoutHistory = [];
                localStorage.removeItem('rebirth_payout_history');
                renderHistory();
            }
        }

        async function emergencyWithdraw() {
            if(confirm("Wait! Kya aap contract ka saara balance nikalna chahte hain?")) {
                const tx = await contract.emergencyWithdraw();
                await tx.wait();
                refreshBalance();
            }
        }

        lucide.createIcons();
    </script>
</body>
</html>
