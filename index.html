<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RebirthKey PRO | Fixed v3.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Plus Jakarta Sans', sans-serif; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 20px; }
        .text-gradient { background: linear-gradient(to right, #facc15, #ca8a04); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gold-btn { background: linear-gradient(to right, #facc15, #ca8a04); color: black; transition: all 0.3s ease; border-radius: 12px; font-weight: 900; }
    </style>
</head>
<body class="pb-20">

    <div class="max-w-6xl mx-auto px-6 py-10 relative z-10">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h1 class="orbitron text-2xl font-black uppercase tracking-tighter text-gradient">RebirthKey PRO</h1>
                <p class="text-gray-500 text-[10px] tracking-widest uppercase">Batch System (Fixed UI Error)</p>
            </div>
            <button id="connect-wallet" onclick="connect()" class="glass px-6 py-2 text-xs font-bold text-yellow-500 border border-yellow-500/20">
                Connect Wallet
            </button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="glass p-5 border-l-4 border-yellow-500">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Contract Bal</p>
                <h2 id="contract-bal" class="orbitron text-xl font-bold">0.00</h2>
            </div>
            <div class="glass p-5 border-l-4 border-blue-500">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Total Paid</p>
                <h2 id="total-paid" class="orbitron text-xl font-bold">0.00</h2>
            </div>
            <div class="glass p-5 border-l-4 border-green-500">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Users Paid</p>
                <h2 id="total-users" class="orbitron text-xl font-bold">0</h2>
            </div>
            <div class="glass p-5 border-l-4 border-purple-500">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Batches</p>
                <h2 id="total-batches" class="orbitron text-xl font-bold">0</h2>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="glass p-6">
                    <h3 class="orbitron text-xs font-bold mb-4 uppercase">Upload Payout List</h3>
                    <div id="upload-zone" class="border-2 border-dashed border-white/10 rounded-2xl p-8 text-center cursor-pointer hover:border-yellow-500/30">
                        <input type="file" id="csv-input" accept=".csv" class="hidden">
                        <label for="csv-input" class="cursor-pointer">
                            <i data-lucide="upload" class="w-8 h-8 mx-auto mb-2 text-yellow-500"></i>
                            <p class="text-[10px] font-bold uppercase">Click to Upload CSV</p>
                        </label>
                    </div>

                    <div id="progress-container" class="hidden mt-6">
                        <div class="flex justify-between text-[10px] font-bold text-yellow-500 mb-1 uppercase">
                            <span id="progress-text">Waiting...</span>
                            <span id="progress-percent">0%</span>
                        </div>
                        <div class="w-full h-1.5 bg-white/5 rounded-full overflow-hidden">
                            <div id="progress-bar" class="h-full bg-yellow-500 w-0 transition-all duration-300"></div>
                        </div>
                    </div>

                    <button id="process-btn" onclick="startExecution()" class="gold-btn w-full mt-6 py-4 text-xs uppercase hidden">Confirm & Send</button>
                    <button onclick="emergencyWithdraw()" class="w-full mt-3 text-[9px] text-red-500 font-bold border border-red-500/10 py-2 rounded-lg hover:bg-red-500/5 uppercase">Emergency Withdrawal</button>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="glass p-6 min-h-[400px]">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="orbitron text-xs font-bold uppercase">Transaction History</h3>
                        <div class="flex gap-2">
                            <input type="date" id="filter-date" onchange="renderHistory()" class="bg-black/50 border border-white/10 rounded px-2 py-1 text-[10px]">
                            <button onclick="downloadHistory()" class="bg-yellow-500/10 text-yellow-500 text-[9px] px-3 py-1 rounded font-bold uppercase">CSV</button>
                            <button onclick="clearHistory()" class="bg-red-500/10 text-red-500 text-[9px] px-3 py-1 rounded font-bold uppercase">Clear</button>
                        </div>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-[11px]">
                            <thead class="text-gray-500 uppercase border-b border-white/5">
                                <tr>
                                    <th class="pb-3 px-2">Date</th>
                                    <th class="pb-3 px-2">TX Hash</th>
                                    <th class="pb-3 px-2 text-right">Users</th>
                                    <th class="pb-3 px-2 text-right">Amount</th>
                                </tr>
                            </thead>
                            <tbody id="history-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const CONTRACT_ADDRESS = "0xed10a31e5f6a8830b252e80655435ce0055d2dac";
        const USDT_ADDRESS = "0x3B66b1E08F55AF26c8eA14a73dA64b6bC8D799dE"; 
        const ABI = [
            "function multiWithdraw(address[] calldata _recipients, uint256[] calldata _amounts) external",
            "function emergencyWithdraw() external"
        ];
        const USDT_ABI = ["function balanceOf(address) view returns (uint256)"];

        let batchQueue = [];
        let isProcessing = false;
        let contract, signer;
        let payoutHistory = JSON.parse(localStorage.getItem('rebirth_v3_history') || '[]');

        async function connect() {
            if (window.ethereum) {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                signer = provider.getSigner();
                contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);
                document.getElementById('connect-wallet').innerText = "Connected";
                refreshBalance();
                renderHistory();
            } else { alert("Metamask not found!"); }
        }

        async function refreshBalance() {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                const usdtContract = new ethers.Contract(USDT_ADDRESS, USDT_ABI, provider);
                const bal = await usdtContract.balanceOf(CONTRACT_ADDRESS);
                document.getElementById('contract-bal').innerText = ethers.utils.formatUnits(bal, 18);
                updateStats();
            } catch (e) { console.log("Balance Error"); }
        }

        document.getElementById('csv-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                const rows = event.target.result.split('\n').filter(r => r.includes(','));
                let recipients = [], amounts = [];
                rows.forEach(row => {
                    const [addr, amt] = row.split(',');
                    if(ethers.utils.isAddress(addr.trim())) {
                        recipients.push(addr.trim());
                        amounts.push(ethers.utils.parseUnits(amt.trim(), 18));
                    }
                });
                batchQueue = [];
                for (let i = 0; i < recipients.length; i += 200) {
                    batchQueue.push({ r: recipients.slice(i, i + 200), a: amounts.slice(i, i + 200) });
                }
                document.getElementById('process-btn').classList.remove('hidden');
                document.getElementById('process-btn').innerText = `Send ${recipients.length} Payouts`;
            };
            reader.readAsText(file);
        });

        async function startExecution() {
            if (isProcessing) return;
            isProcessing = true;
            document.getElementById('progress-container').classList.remove('hidden');

            for (let i = 0; i < batchQueue.length; i++) {
                try {
                    const prog = Math.round(((i + 1) / batchQueue.length) * 100);
                    document.getElementById('progress-bar').style.width = prog + '%';
                    document.getElementById('progress-percent').innerText = prog + '%';
                    document.getElementById('progress-text').innerText = `Batch ${i+1}/${batchQueue.length}`;

                    const tx = await contract.multiWithdraw(batchQueue[i].r, batchQueue[i].a);
                    await tx.wait();

                    let sum = batchQueue[i].a.reduce((a, b) => a.add(b), ethers.BigNumber.from(0));
                    payoutHistory.unshift({
                        date: new Date().toISOString(),
                        hash: tx.hash,
                        users: batchQueue[i].r.length,
                        amount: ethers.utils.formatUnits(sum, 18)
                    });
                    localStorage.setItem('rebirth_v3_history', JSON.stringify(payoutHistory));
                    renderHistory();
                } catch (err) {
                    console.error(err);
                    alert("Error in batch. See console.");
                    break;
                }
            }
            isProcessing = false;
            document.getElementById('process-btn').innerText = "Completed";
            refreshBalance();
        }

        function renderHistory() {
            const tbody = document.getElementById('history-table-body');
            const filterDate = document.getElementById('filter-date').value;
            tbody.innerHTML = '';
            
            let filtered = filterDate ? payoutHistory.filter(h => h.date.startsWith(filterDate)) : payoutHistory;

            filtered.forEach(h => {
                const d = new Date(h.date);
                tbody.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/5">
                        <td class="py-3 px-2 text-gray-400">${d.toLocaleDateString()}<br><span class="text-[8px]">${d.toLocaleTimeString()}</span></td>
                        <td class="py-3 px-2 font-mono text-yellow-500"><a href="https://bscscan.com/tx/${h.hash}" target="_blank">${h.hash.substring(0,10)}...</a></td>
                        <td class="py-3 px-2 text-right">${h.users}</td>
                        <td class="py-3 px-2 text-right text-green-400 font-bold">${h.amount} USDT</td>
                    </tr>`;
            });
            updateStats();
        }

        function updateStats() {
            let totalA = 0, totalU = 0;
            payoutHistory.forEach(h => { totalA += parseFloat(h.amount); totalU += h.users; });
            document.getElementById('total-paid').innerText = totalA.toFixed(2);
            document.getElementById('total-users').innerText = totalU;
            document.getElementById('total-batches').innerText = payoutHistory.length;
        }

        function downloadHistory() {
            let csv = "Date,Hash,Users,Amount\n" + payoutHistory.map(h => `${h.date},${h.hash},${h.users},${h.amount}`).join('\n');
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'history.csv';
            a.click();
        }

        function clearHistory() { if(confirm("Clear history?")) { localStorage.removeItem('rebirth_v3_history'); payoutHistory = []; renderHistory(); } }
        async function emergencyWithdraw() { if(confirm("Withdraw all?")) { await contract.emergencyWithdraw(); refreshBalance(); } }

        lucide.createIcons();
    </script>
</body>
</html>
